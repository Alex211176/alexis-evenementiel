<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default("Connexion") }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
    <style>
        .login-wrap { min-height: 80vh; display: flex; align-items: center; justify-content: center; }
        .login-card {
            background: var(--surface, #fff); border: 1px solid var(--rule, #E2E8F0);
            border-radius: 14px; padding: 32px 28px; width: 320px; max-width: 90vw;
        }
        .login-card h1 { font-size: 20px; margin: 0 0 4px; }
        .login-card p.sub { color: var(--ink-muted, #64748B); margin: 0 0 22px; font-size: 13px; }
        .login-card label { display: block; font-size: 13px; color: var(--ink-soft, #334155); margin-bottom: 6px; }
        .login-card input {
            width: 100%; height: 44px; padding: 0 13px; font-size: 16px; font-family: inherit;
            border: 1px solid var(--rule, #E2E8F0); border-radius: 9px; outline: none;
        }
        .login-card input:focus { border-color: var(--accent, #B45309); box-shadow: 0 0 0 3px rgba(180,83,9,.12); }
        .login-card button {
            width: 100%; height: 44px; margin-top: 16px; border: none; border-radius: 9px;
            background: var(--ink, #0F172A); color: #fff; font-size: 15px; font-weight: 600;
            font-family: inherit; cursor: pointer;
        }
        .login-card .flash { background: var(--danger-soft, #FEF2F2); color: var(--danger, #991B1B);
            border-radius: 8px; padding: 9px 12px; font-size: 13px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <h1>Alexis Événementiel</h1>
            <p class="sub">Espace pro · catalogue &amp; devis</p>
            {% with messages = get_flashed_messages() %}
                {% if messages %}<div class="flash">{{ messages[0] }}</div>{% endif %}
            {% endwith %}
            <form method="post" autocomplete="off">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password"
                       autocomplete="current-password" required autofocus>
                <button type="submit">Entrer</button>
            </form>
        </div>
    </div>
</body>
</html>
