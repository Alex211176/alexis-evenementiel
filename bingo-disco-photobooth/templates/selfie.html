<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Bingo Disco — Photo</title>
  <style>
    :root { --or:#e8c14a; --bg:#0d0d16; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; font-family:system-ui,-apple-system,sans-serif; background:var(--bg);
           color:#fff; min-height:100dvh; display:flex; flex-direction:column; }
    header { text-align:center; padding:18px; }
    header h1 { margin:0; font-size:20px; letter-spacing:1px; }
    header h1 span { color:var(--or); }
    main { flex:1; display:flex; flex-direction:column; align-items:center; gap:14px;
           padding:0 18px 24px; }
    .stage { width:100%; max-width:480px; aspect-ratio:3/4; border-radius:18px;
             overflow:hidden; background:#000; position:relative; border:2px solid #2a2a3a; }
    video, canvas, img.preview { width:100%; height:100%; object-fit:cover; display:block; }
    .field { width:100%; max-width:480px; }
    input[type=text] { width:100%; padding:14px; border-radius:12px; border:1px solid #333;
                       background:#1a1a26; color:#fff; font-size:16px; }
    button { width:100%; max-width:480px; padding:16px; border:0; border-radius:14px;
             font-size:17px; font-weight:700; background:var(--or); color:#1a1206; }
    button.secondary { background:#23233a; color:#fff; }
    button:disabled { opacity:.5; }
    .msg { min-height:22px; text-align:center; font-size:14px; }
    .msg.err { color:#ff8080; } .msg.ok { color:#8cffa0; }
    .closed { text-align:center; padding:40px 20px; }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <header><h1>Bingo <span>Disco</span> · Photo</h1></header>
  <main>
    <div id="closed" class="closed hidden">
      <p style="font-size:18px">📸 Le mode photo n'est pas encore ouvert.</p>
      <p style="opacity:.7">Attends le signal de l'animateur, puis recharge la page.</p>
    </div>

    <div id="capture" class="hidden">
      <div class="field">
        <input id="name" type="text" placeholder="Ton prénom (optionnel)" autocomplete="off">
      </div>
      <div id="themeField" class="field hidden">
        <select id="theme" style="width:100%; padding:14px; border-radius:12px; border:1px solid #333; background:#1a1a26; color:#fff; font-size:16px;"></select>
      </div>
      <div class="stage">
        <video id="video" autoplay playsinline muted></video>
        <img id="preview" class="preview hidden" alt="aperçu">
        <canvas id="canvas" class="hidden"></canvas>
      </div>
      <button id="shoot">Prendre la photo</button>
      <button id="retake" class="secondary hidden">Reprendre</button>
      <button id="send" class="hidden">Envoyer ✨</button>
      <!-- Repli iOS si getUserMedia indisponible -->
      <input id="file" type="file" accept="image/*" capture="user" class="hidden">
      <div id="msg" class="msg"></div>
    </div>
  </main>

  <script>
    const $ = s => document.querySelector(s);
    const video=$('#video'), canvas=$('#canvas'), preview=$('#preview'),
          shoot=$('#shoot'), retake=$('#retake'), send=$('#send'),
          file=$('#file'), msg=$('#msg');
    let captured = null;

    async function init(){
      // Le mode photo est-il ouvert ? Le joueur choisit-il son thème ?
      try {
        const st = await (await fetch('/api/state')).json();
        if(!st.settings.photo_mode_enabled){ $('#closed').classList.remove('hidden'); return; }
        if(st.settings.theme_mode === 'free'){
          const sel = $('#theme');
          for(const t of st.themes.filter(t=>t.active))
            sel.add(new Option(t.label, t.id));
          if(st.settings.current_theme_id) sel.value = st.settings.current_theme_id;
          $('#themeField').classList.remove('hidden');
        }
      } catch(e){}
      $('#capture').classList.remove('hidden');
      startCamera();
    }

    async function startCamera(){
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:1280} }, audio:false });
        video.srcObject = stream;
      } catch(e){
        // Repli : input fichier avec caméra frontale
        video.classList.add('hidden');
        shoot.textContent = 'Ouvrir la caméra';
        shoot.onclick = ()=> file.click();
        file.onchange = ()=> { const f=file.files[0]; if(f) loadFile(f); };
      }
    }

    function loadFile(f){
      const r = new FileReader();
      r.onload = ()=> showPreview(r.result);
      r.readAsDataURL(f);
    }

    shoot.addEventListener('click', ()=>{
      if(video.classList.contains('hidden')) return; // mode fichier géré ailleurs
      const s = Math.min(video.videoWidth, video.videoHeight);
      canvas.width = s; canvas.height = s;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, (video.videoWidth-s)/2, (video.videoHeight-s)/2, s, s, 0,0,s,s);
      showPreview(canvas.toDataURL('image/jpeg', 0.9));
    });

    function showPreview(dataUrl){
      captured = dataUrl;
      preview.src = dataUrl;
      preview.classList.remove('hidden'); video.classList.add('hidden');
      shoot.classList.add('hidden'); retake.classList.remove('hidden'); send.classList.remove('hidden');
    }

    retake.addEventListener('click', ()=>{
      captured=null; preview.classList.add('hidden'); video.classList.remove('hidden');
      shoot.classList.remove('hidden'); retake.classList.add('hidden'); send.classList.add('hidden');
      msg.textContent='';
    });

    send.addEventListener('click', async ()=>{
      if(!captured) return;
      send.disabled=true; msg.className='msg'; msg.textContent='Envoi en cours…';
      try {
        const themeSel = document.getElementById('theme');
        const themeId = (themeSel && !$('#themeField').classList.contains('hidden')) ? themeSel.value : undefined;
        const r = await fetch('/api/capture', { method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ player_name:$('#name').value, image:captured, theme_id:themeId }) });
        const j = await r.json();
        if(!r.ok) throw new Error(j.error||'Erreur');
        msg.className='msg ok';
        msg.textContent='✅ Photo envoyée ! Regarde l\'écran 🪩';
        send.classList.add('hidden'); retake.textContent='Envoyer une autre';
      } catch(e){ msg.className='msg err'; msg.textContent='❌ '+e.message; }
      finally { send.disabled=false; }
    });

    init();
  </script>
</body>
</html>
